<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LucaWriter</title>
<link rel="icon" href="icon.ico">
<style>
:root{--bg:#111;--surface:#1a1a1a;--surface2:#222;--t1:#e8e4de;--t2:#8a8580;--t3:#5a5550;--accent:#bca55d;--on-accent:#111;--danger:#c45c5c;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);--r1:4px;--r4:0px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue","Noto Sans SC",sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.login-titlebar{display:none;height:44px;background:var(--surface);border-bottom:1px solid var(--border2);flex-shrink:0;-webkit-app-region:drag;align-items:center;padding:0 14px;justify-content:flex-end}
body.electron .login-titlebar{display:flex}
.login-titlebar .win-controls{display:flex;align-items:stretch;height:44px;-webkit-app-region:no-drag}
.login-titlebar .win-controls button{background:none;border:none;color:var(--t2);width:46px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .1s;font-size:14px;padding:0}
.login-titlebar .win-controls button:hover{background:var(--surface3);color:var(--t1)}
.login-titlebar .win-controls .wc-close:hover{background:var(--danger);color:#fff}
.login-titlebar .win-controls svg{width:10px;height:10px;stroke:currentColor;stroke-width:1.3;fill:none}
.login-body{flex:1;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:380px;padding:20px}
.card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r4);padding:40px 32px}
.brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px}
.brand-icon{width:40px;height:40px;flex-shrink:0}
.brand-icon img{width:100%;height:100%;border-radius:6px}
.brand h1{font-size:22px;font-weight:700;letter-spacing:-.5px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:9px;font-weight:700;color:var(--t2);margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase}
.fg input{width:100%;padding:10px 12px;background:var(--surface2);color:var(--t1);border:1px solid var(--border);border-radius:var(--r1);font-size:14px;outline:none;transition:border-color .1s}
.fg input:focus{border-color:var(--accent)}
.fg input::placeholder{color:var(--t3)}
.fg .hint{font-size:11px;color:var(--t3);margin-top:4px}
.btn{width:100%;padding:11px;background:var(--accent);color:var(--on-accent);border:none;border-radius:var(--r1);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .1s;margin-top:4px}
.btn:active{opacity:.8}
.btn:disabled{opacity:.4;cursor:not-allowed}
.err{color:var(--danger);font-size:12px;margin-top:10px;text-align:center;display:none}
.setup-mode .brand h1::after{content:' — Setup';font-size:12px;font-weight:400;color:var(--t2);margin-left:6px}
.remember-toggle{display:block;text-align:center;margin:8px auto;padding:6px 12px;width:fit-content;border:1.5px solid var(--t3);border-radius:var(--r1);cursor:pointer;user-select:none;font-size:13px;color:var(--t3);background:transparent;transition:background .15s,border-color .15s,color .15s;outline:none}
.remember-toggle:focus-visible{box-shadow:0 0 0 2px var(--accent)}
.remember-toggle.active{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
</style>
</head>
<body>
<div class="login-titlebar" id="loginTitlebar">
  <div class="win-controls">
    <button class="wc-min" onclick="electronAPI.minimize()" title="最小化"><svg viewBox="0 0 10 10"><line x1="0" y1="5" x2="10" y2="5"/></svg></button>
    <button class="wc-max" id="wcMax" onclick="electronAPI.maximize()" title="最大化"><svg viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9"/></svg></button>
    <button class="wc-close" onclick="electronAPI.close()" title="关闭"><svg viewBox="0 0 10 10"><line x1="0" y1="0" x2="10" y2="10"/><line x1="10" y1="0" x2="0" y2="10"/></svg></button>
  </div>
</div>
<div class="login-body">
<div class="wrap">
<div class="card" id="mainCard">
  <div class="brand"><div class="brand-icon"><img src="icon.png" alt="LucaWriter"></div><h1>LucaWriter</h1></div>
  <form id="authForm">
    <div class="fg"><label>Username</label><input type="text" id="username" required placeholder="Username" autocomplete="username"></div>
    <div class="fg"><label>Password</label><input type="password" id="password" required placeholder="Password (min 4)" autocomplete="current-password"><div class="hint" id="pwHint"></div></div>
    <div class="fg" id="pw2Group" style="display:none"><label>Confirm</label><input type="password" id="password2" placeholder="Re-enter password" autocomplete="new-password"></div>
    <div class="remember-toggle" id="rememberToggle" tabindex="0" role="checkbox" aria-checked="false" onclick="toggleRemember()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleRemember()}">记住登录</div>
    <button type="submit" class="btn" id="submitBtn">Login</button>
    <p class="err" id="errMsg"></p>
  </form>
</div>
</div>
</div>
<script>
if(window.electronAPI)document.body.classList.add('electron');
if(window.electronAPI&&window.electronAPI.onMaximizeChange){function _updateMaxBtn(m){var b=document.getElementById('wcMax');if(!b)return;if(m){b.title='还原';b.innerHTML='<svg viewBox="0 0 10 10"><rect x="2.5" y="0.5" width="7" height="7"/><rect x="0.5" y="2.5" width="7" height="7"/></svg>'}else{b.title='最大化';b.innerHTML='<svg viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9"/></svg>'}}window.electronAPI.onMaximizeChange(function(m){_updateMaxBtn(m)});window.electronAPI.isMaximized().then(function(m){_updateMaxBtn(m)});var _tb=document.querySelector('.login-titlebar');if(_tb)_tb.addEventListener('dblclick',function(e){if(e.target.closest('.win-controls')||e.target.closest('button')||e.target.closest('input'))return;window.electronAPI.maximize()})}
var isSetup=false;
var rememberActive=false;
function toggleRemember(){rememberActive=!rememberActive;var el=$('rememberToggle');el.classList.toggle('active',rememberActive);el.setAttribute('aria-checked',rememberActive)}
function api(m,p,d,cb){var x=new XMLHttpRequest();x.onload=function(){try{cb(JSON.parse(this.responseText),this.status)}catch(e){cb({error:'err'},this.status)}};x.onerror=function(){cb({error:'err'},0)};x.open(m,p);x.setRequestHeader('Cache-Control','no-cache');x.setRequestHeader('Pragma','no-cache');if(d!==undefined){x.setRequestHeader('Content-Type','application/json');x.send(JSON.stringify(d))}else x.send()}

api('GET','/api/auth/status',undefined,function(d){if(!d.has_users){isSetup=true;$('mainCard').classList.add('setup-mode');$('submitBtn').textContent='Create Account';$('username').placeholder='Set username';$('password').placeholder='Set password (min 4)';$('pwHint').textContent='Create your admin account';$('pw2Group').style.display='block';return}if(d.logged_in){location.href='/';return}});

function $(id){return document.getElementById(id)}

$('authForm').addEventListener('submit',function(e){
  e.preventDefault();var u=$('username').value.trim(),p=$('password').value,p2=$('password2').value;
  if(!u||!p){showErr('Fill in username and password');return}
  if(isSetup){if(p.length<4){showErr('Min 4 characters');return}if(p!==p2){showErr('Passwords do not match');return}$('submitBtn').disabled=true;api('POST','/api/auth/setup',{username:u,password:p,remember:rememberActive},function(d,s){$('submitBtn').disabled=false;if(s===200&&d.ok)location.href='/';else showErr(d.error||'Failed')})}
  else{$('submitBtn').disabled=true;api('POST','/api/auth/login',{username:u,password:p,remember:rememberActive},function(d,s){$('submitBtn').disabled=false;if(s===200&&d.ok)location.href='/';else showErr(d.error||'Login failed')})}
});

function showErr(t){var e=$('errMsg');e.textContent=t;e.style.display='block'}
</script>
</body>
</html>
